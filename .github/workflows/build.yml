name: Build UsbDk

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, Win32]
        target: [Win10]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows SDK and WDK
        shell: powershell
        run: |
          # Install WDK for Windows 11 (includes Win10 targets)
          choco install windowsdriverkit11 -y --no-progress 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "WDK choco install returned $LASTEXITCODE, trying direct install..."
          }
          # Verify WDK installation
          $wdkPath = "C:\Program Files (x86)\Windows Kits\10"
          if (Test-Path $wdkPath) {
            Write-Host "WDK found at: $wdkPath"
            Get-ChildItem "$wdkPath\build" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          } else {
            Write-Host "WDK not found at expected path"
          }

      - name: Build driver and user-mode components
        shell: cmd
        run: |
          msbuild UsbDk.sln /p:Configuration="${{ matrix.target }} ${{ matrix.configuration }}" /p:Platform="${{ matrix.platform }}" /t:Rebuild /m
        continue-on-error: true

      - name: Collect build artifacts
        if: always()
        shell: powershell
        run: |
          $outDir = "artifacts"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          # Collect driver package files
          $patterns = @("*.sys", "*.dll", "*.exe", "*.inf", "*.cat")
          $searchDirs = @(
            "${{ matrix.target }}${{ matrix.configuration }}",
            "${{ matrix.platform }}\${{ matrix.target }}${{ matrix.configuration }}"
          )

          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              foreach ($pattern in $patterns) {
                Get-ChildItem -Path $dir -Filter $pattern -Recurse -ErrorAction SilentlyContinue |
                  ForEach-Object {
                    $dest = Join-Path $outDir $_.Name
                    Copy-Item $_.FullName $dest -Force
                    Write-Host "Collected: $($_.FullName) -> $dest"
                  }
              }
            }
          }

          # Also check for MSI installer outputs
          if (Test-Path "Install") {
            Get-ChildItem -Path "Install" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue |
              ForEach-Object {
                Copy-Item $_.FullName (Join-Path $outDir $_.Name) -Force
                Write-Host "Collected MSI: $($_.FullName)"
              }
          }

          # List what we collected
          Write-Host "`nCollected artifacts:"
          Get-ChildItem $outDir | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: UsbDk-${{ matrix.target }}-${{ matrix.configuration }}-${{ matrix.platform }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  build-msi:
    runs-on: windows-latest
    needs: build
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset -y --no-progress
          # Add WiX to PATH
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wixPath)) {
            $wixPath = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          }
          if (Test-Path $wixPath) {
            Write-Host "WiX found at: $wixPath"
            echo "WIX=$wixPath\" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Host "WiX not found, searching..."
            Get-ChildItem "C:\Program Files (x86)" -Filter "WiX*" -Directory -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  Found: $_" }
          }

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-output/

      - name: Build MSI installer
        if: always()
        shell: cmd
        run: |
          echo Building MSI installer...
          if defined WIX (
            echo WiX path: %WIX%
          ) else (
            echo WiX not configured, skipping MSI build
            exit /B 0
          )
          SET UsbDkVersion=1.0.22
          mkdir Install\x86 2>nul
          mkdir Install\x64 2>nul
          mkdir Install_Debug\x86 2>nul
          mkdir Install_Debug\x64 2>nul
          pushd Tools\Installer
          call buildmsi.bat NOSIGN
          popd
        continue-on-error: true

      - name: Upload MSI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: UsbDk-Installer-MSI
          path: |
            Install/**/*.msi
            Install_Debug/**/*.msi
          if-no-files-found: warn
          retention-days: 30
